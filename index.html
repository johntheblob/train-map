<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>SL Tunnelbana – Röda linjen 14</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
html, body { margin:0; height:100%; }
#map { height:100%; }
#panel {
    position:absolute; top:10px; right:10px;
    background:white; padding:15px; border-radius:12px;
    z-index:1000; font-family:Arial; width:220px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
<b>🚇 Linje 14 – Röda linjen</b><br>
<div id="info">Laddar...</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://rawgit.com/bbecquet/Leaflet.RotatedMarker/master/leaflet.rotatedMarker.js"></script>

<script>
// Initiera karta
const map = L.map('map').setView([59.33, 18.06], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Stationsdata för röda linjen (Fruängen → Mörby)
const stations = [
    {name:"Fruängen", pos:[59.285,17.965]},
    {name:"Västertorp", pos:[59.292,17.970]},
    {name:"Hägerstensåsen", pos:[59.300,17.975]},
    {name:"Telefonplan", pos:[59.304,17.980]},
    {name:"Midsommarkransen", pos:[59.310,17.990]},
    {name:"Liljeholmen", pos:[59.309,18.022]},
    {name:"Hornstull", pos:[59.316,18.033]},
    {name:"Zinkensdamm", pos:[59.317,18.049]},
    {name:"Mariatorget", pos:[59.318,18.060]},
    {name:"Slussen", pos:[59.319,18.073]},
    {name:"Gamla stan", pos:[59.324,18.067]},
    {name:"T-Centralen", pos:[59.330,18.059]},
    {name:"Östermalmstorg", pos:[59.336,18.073]},
    {name:"Stadion", pos:[59.342,18.079]},
    {name:"Tekniska högskolan", pos:[59.345,18.072]},
    {name:"Universitetet", pos:[59.365,18.054]},
    {name:"Mörby centrum", pos:[59.398,18.036]}
];

// Rita spåret
L.polyline(stations.map(s=>s.pos), {color:"red", weight:6}).addTo(map);
stations.forEach(s=>L.circleMarker(s.pos,{radius:6,color:"black",fillColor:"white",fillOpacity:1})
    .addTo(map)
    .bindPopup(s.name));

// Ikon för tåg
const trainIcon = L.icon({
    iconUrl:"https://cdn-icons-png.flaticon.com/512/71/71298.png",
    iconSize:[32,32]
});

let markers = {};

// Konvertera Roblox koordinater till lat/lon
const origin = { x:1396.36, z:-2190.94, lat:59.285, lon:17.965 };
const scale = 0.00001;
function convert(x,z){
    return [origin.lat + (z-origin.z)*scale, origin.lon + (x-origin.x)*scale];
}

// Snap till närmaste spårsegment
function snapToTrack(lat, lon){
    let closestPoint=null, minDist=Infinity;
    for(let i=0;i<stations.length-1;i++){
        const A=stations[i].pos, B=stations[i+1].pos;
        const AP=[lat-A[0], lon-A[1]], AB=[B[0]-A[0], B[1]-A[1]];
        const ab2=AB[0]*AB[0]+AB[1]*AB[1];
        const t=Math.max(0, Math.min(1, (AP[0]*AB[0]+AP[1]*AB[1])/ab2));
        const point=[A[0]+AB[0]*t, A[1]+AB[1]*t];
        const dist=Math.hypot(lat-point[0], lon-point[1]);
        if(dist<minDist){ minDist=dist; closestPoint=point; }
    }
    return closestPoint;
}

// Närmaste station
function nearestStation(lat, lon){
    let closest=stations[0], min=Infinity;
    stations.forEach(s=>{
        let d=Math.hypot(s.pos[0]-lat,s.pos[1]-lon);
        if(d<min){ min=d; closest=s; }
    });
    return closest.name;
}

// Ladda tågdata och uppdatera kartan
async function loadTrains(){
    try {
        const res = await fetch("https://train-api-7hml.onrender.com/trains");
        if(!res.ok) throw new Error("Bad response från API");
        const data = await res.json();

        let info="";
        data.forEach(train=>{
            let [lat, lon] = convert(train.x, train.z);
            [lat, lon] = snapToTrack(lat, lon);
            const dir = train.dir ?? 1;
            const angle = dir > 0 ? 180 : 0; // inverted. solves bugfix
            const station = nearestStation(lat, lon);

            if(markers[train.id]){
                markers[train.id].setLatLng([lat, lon]);
                markers[train.id].setRotationAngle(angle);
            } else {
                markers[train.id] = L.marker([lat, lon], {icon: trainIcon, rotationAngle: angle})
                    .addTo(map)
                    .bindPopup(`🚆 ${train.id}<br>📍 ${station}`);
            }
            info += `🚆 ${train.id}<br>📍 ${station}<br><br>`;
        });
        document.getElementById("info").innerHTML = info;
    } catch(e){
        console.warn("API fel, försöker om 3s", e);
        setTimeout(loadTrains,3000); // retry
    }
}

// Starta första laddning
loadTrains();

// Uppdatera var 3:e sekund
setInterval(loadTrains, 3000);
</script>
</body>
</html>
