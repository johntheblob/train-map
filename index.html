<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Train Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; }
        #map { height: 100%; }
        #debug {
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(255,255,255,0.9);
            z-index: 1000;
            max-height: 200px;
            overflow: auto;
            font-family: monospace;
            padding: 5px;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="debug"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([57.7, 11.9], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let markers = {};

// Konvertera Roblox X/Z till lat/lon (justera vid behov)
function convert(x, z) {
    return [
        57.7 + (z / 1000),   // lat
        11.9 + (x / 1000)    // lon
    ];
}

async function loadTrains() {
    try {
        const res = await fetch("https://train-api-7hml.onrender.com/trains");
        const data = await res.json();

        document.getElementById("debug").innerText = JSON.stringify(data, null, 2);

        let latlngs = [];

        data.forEach(train => {
            const [lat, lon] = convert(train.x, train.z);
            latlngs.push([lat, lon]);

            if (markers[train.id]) {
                markers[train.id].setLatLng([lat, lon]);
            } else {
                markers[train.id] = L.marker([lat, lon]).addTo(map)
                    .bindPopup(train.id);
            }
        });

        if (latlngs.length > 0) {
            const bounds = L.latLngBounds(latlngs);
            map.fitBounds(bounds, {padding: [50, 50]});
        }

    } catch (e) {
        console.error("Kunde inte ladda tåg:", e);
        document.getElementById("debug").innerText = "Fel vid laddning av tåg: " + e;
    }
}

// Kör direkt
loadTrains();
// Uppdatera var 3:e sekund
setInterval(loadTrains, 3000);
</script>

</body>
</html>
