<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SL MAX LEVEL</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
html, body { margin:0; height:100%; background:#0b0f14; }
#map { height:100%; }

#hud {
    position:absolute;
    bottom:20px;
    left:20px;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:15px;
    border-radius:12px;
    font-family:Arial;
    z-index:1000;
}

.leaflet-interactive {
    filter: drop-shadow(0 0 6px red);
}
</style>
</head>
<body>

<div id="map"></div>
<div id="hud">🚇 SL Live</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://rawgit.com/bbecquet/Leaflet.RotatedMarker/master/leaflet.rotatedMarker.js"></script>

<script>
// ================= MAP =================
const map = L.map('map').setView([59.33,18.06],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    opacity:0.5
}).addTo(map);

// ================= LINE =================
const line14 = [
[59.285,17.965],[59.292,17.970],[59.300,17.975],
[59.304,17.980],[59.310,17.990],[59.309,18.022],
[59.316,18.033],[59.317,18.049],[59.318,18.060],
[59.319,18.073],[59.324,18.067],[59.330,18.059],
[59.336,18.073],[59.342,18.079],[59.345,18.072],
[59.365,18.054],[59.398,18.036]
];

const names = [
"Fruängen","Västertorp","Hägerstensåsen","Telefonplan",
"Midsommarkransen","Liljeholmen","Hornstull","Zinkensdamm",
"Mariatorget","Slussen","Gamla stan","T-Centralen",
"Östermalmstorg","Stadion","Tekniska högskolan",
"Universitetet","Mörby centrum"
];

L.polyline(line14,{color:"#ff2d2d",weight:8}).addTo(map);

line14.forEach((p,i)=>{
    L.circleMarker(p,{
        radius:5,color:"#fff",fillColor:"#ff2d2d",fillOpacity:1
    }).addTo(map).bindPopup(names[i]);
});

// ================= TRAIN =================
const icon = L.icon({
    iconUrl:"https://cdn-icons-png.flaticon.com/512/71/71298.png",
    iconSize:[28,28]
});

let markers={}, targets={}, speeds={};

// Roblox mapping
const origin={x:1396.36,z:-2190.94,lat:59.285,lon:17.965};
const scale=0.00001;

function convert(x,z){
    return [origin.lat+(z-origin.z)*scale, origin.lon+(x-origin.x)*scale];
}

// SNAP
function snap(lat,lon){
    let best=null,dist=9999;
    for(let i=0;i<line14.length-1;i++){
        let A=line14[i],B=line14[i+1];
        let AP=[lat-A[0],lon-A[1]];
        let AB=[B[0]-A[0],B[1]-A[1]];
        let t=Math.max(0,Math.min(1,(AP[0]*AB[0]+AP[1]*AB[1])/(AB[0]*AB[0]+AB[1]*AB[1])));
        let p=[A[0]+AB[0]*t,A[1]+AB[1]*t];
        let d=Math.hypot(lat-p[0],lon-p[1]);
        if(d<dist){dist=d; best=p;}
    }
    return best;
}

// STATION CHECK
function nearStation(lat,lon){
    for(let i=0;i<line14.length;i++){
        let d=Math.hypot(lat-line14[i][0],lon-line14[i][1]);
        if(d<0.001) return i;
    }
    return -1;
}

// LOAD API
async function load(){
    try{
        let res=await fetch("https://train-api-7hml.onrender.com/trains");
        let data=await res.json();

        data.forEach(t=>{
            let [lat,lon]=convert(t.x,t.z);
            [lat,lon]=snap(lat,lon);

            targets[t.id]={lat,lon};

            if(!markers[t.id]){
                markers[t.id]=L.marker([lat,lon],{icon:icon}).addTo(map);
                speeds[t.id]=0.02;
            }
        });

    }catch{
        setTimeout(load,3000);
    }
}

load();
setInterval(load,2000);

// ANIMATION ENGINE
function animate(){
    Object.keys(markers).forEach(id=>{
        let m=markers[id];
        let t=targets[id];
        if(!t) return;

        let c=m.getLatLng();

        // station braking
        let stationIndex=nearStation(t.lat,t.lon);
        if(stationIndex!=-1){
            speeds[id]*=0.95; // slow down
        } else {
            speeds[id]+=0.002; // accelerate
            speeds[id]=Math.min(speeds[id],0.15);
        }

        let lat=c.lat+(t.lat-c.lat)*speeds[id];
        let lon=c.lng+(t.lon-c.lng)*speeds[id];

        let dx=t.lon-c.lng;
        let dy=t.lat-c.lat;
        let angle=Math.atan2(dy,dx)*180/Math.PI;

        m.setLatLng([lat,lon]);
        m.setRotationAngle(angle);

        let station=stationIndex!=-1 ? names[stationIndex] : "Mellan stationer";

        m.bindPopup(`🚆 ${id}<br>📍 ${station}`);

        // FOLLOW CAMERA (första tåget)
        if(id===Object.keys(markers)[0]){
            map.setView([lat,lon],13);
            document.getElementById("hud").innerHTML =
                `🚆 ${id}<br>📍 ${station}`;
        }
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
